name: Build

on:
  push:
    branches: [main]
    paths:
      - 'CameraWebServer/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'CameraWebServer/**'
      - '.github/workflows/build.yml'

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse ci.yml → build matrix
        id: set-matrix
        run: |
          python3 - <<'EOF'
          import yaml, json, os

          with open("CameraWebServer/ci.yml") as f:
              ci = yaml.safe_load(f)

          fqbns = []
          for fqbn_list in ci["fqbn"].values():
              fqbns.extend(fqbn_list)

          matrix = json.dumps({"fqbn": fqbns})
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"matrix={matrix}\n")

          print(f"Generated {len(fqbns)} build target(s)")
          for fqbn in fqbns:
              print(f"  {fqbn}")
          EOF

  build:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Install espressif:esp32 platform
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install espressif:esp32

      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn "${{ matrix.fqbn }}" \
            --build-property "build.partitions=partitions" \
            CameraWebServer

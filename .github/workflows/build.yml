name: Build

on:
  push:
    branches: [main]
    paths:
      - 'CameraWebServer/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'CameraWebServer/**'
      - '.github/workflows/build.yml'

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse ci.yml → build matrix
        id: set-matrix
        run: |
          python3 - <<'EOF'
          import yaml, json, os

          with open("CameraWebServer/ci.yml") as f:
              ci = yaml.safe_load(f)

          fqbns = []
          for fqbn_list in ci["fqbn"].values():
              fqbns.extend(fqbn_list)

          matrix = json.dumps({"fqbn": fqbns})
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"matrix={matrix}\n")

          print(f"Generated {len(fqbns)} build target(s)")
          for fqbn in fqbns:
              print(f"  {fqbn}")
          EOF

  build:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli 0.35.3
        run: |
          curl -fsSL https://github.com/arduino/arduino-cli/releases/download/v0.35.3/arduino-cli_0.35.3_Linux_64bit.tar.gz \
            | sudo tar xz -C /usr/local/bin arduino-cli

      - name: Install espressif:esp32 platform
        env:
          BOARD_URL: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
        run: |
          arduino-cli core update-index --additional-urls "$BOARD_URL"
          arduino-cli core install esp32:esp32 --additional-urls "$BOARD_URL"

      - name: Generate default TLS certificate
        run: |
          chmod +x Scripts/gen_cert.sh
          ./Scripts/gen_cert.sh

      - name: Compile sketch
        env:
          BOARD_URL: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
        run: |
          arduino-cli compile \
            --fqbn "${{ matrix.fqbn }}" \
            --additional-urls "$BOARD_URL" \
            --build-property "build.partitions=partitions" \
            CameraWebServer

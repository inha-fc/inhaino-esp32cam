name: Build

on:
  push:
    branches: [main]
    paths:
      - 'CameraWebServer/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'CameraWebServer/**'
      - '.github/workflows/build.yml'

jobs:
  # ci.yml의 fqbn 목록을 읽어 빌드 매트릭스를 동적으로 생성
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse ci.yml → build matrix
        id: set-matrix
        run: |
          python3 - <<'EOF'
          import yaml, json, os

          with open("CameraWebServer/ci.yml") as f:
              ci = yaml.safe_load(f)

          fqbns = []
          for fqbn_list in ci["fqbn"].values():
              fqbns.extend(fqbn_list)

          matrix = json.dumps({"fqbn": fqbns})
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"matrix={matrix}\n")

          print(f"Generated {len(fqbns)} build target(s)")
          for fqbn in fqbns:
              print(f"  {fqbn}")
          EOF

  build:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Compile sketch
        uses: arduino/compile-sketches@v1
        with:
          fqbn: ${{ matrix.fqbn }}
          sketch-paths: CameraWebServer
          platforms: |
            - name: espressif:esp32
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Check required config (CONFIG_CAMERA_TASK_STACK_SIZE)
        run: |
          python3 - <<'EOF'
          import yaml, re

          with open("CameraWebServer/ci.yml") as f:
              ci = yaml.safe_load(f)

          requires = ci.get("requires", [])
          if not requires:
              print("No requirements to check.")
              exit(0)

          # sdkconfig는 컴파일 캐시 디렉터리에 생성됨
          import glob, sys
          sdkconfig_files = glob.glob("/tmp/arduino*/**/sdkconfig", recursive=True)

          if not sdkconfig_files:
              print("sdkconfig not found, skipping check.")
              exit(0)

          with open(sdkconfig_files[0]) as f:
              sdkconfig = f.read()

          failed = False
          for pattern in requires:
              if not re.search(pattern, sdkconfig, re.MULTILINE):
                  print(f"FAIL: required pattern not found: {pattern}")
                  failed = True
              else:
                  print(f"OK: {pattern}")

          sys.exit(1 if failed else 0)
          EOF
